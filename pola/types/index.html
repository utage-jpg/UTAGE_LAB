<html lang="ja">
<head>
<meta charset="UTF-8">

<title id="pageTitle">Pola タイプ解説</title>

<style>
:root {
  --bg:#faf8f5;--bg2:#f4f0e8;--paper:#fffdf9;--ink:#1c1520;
  --text:#2e2440;--text-mid:#5a4f6e;--text-light:#9b8faa;
  --border:#e2d5c8;--border2:#cfc0b0;
  --rose:#c4566e;--rose-l:#fae0e8;
  --violet:#7655a8;--violet-l:#ece6f8;
  --teal:#2e8b7a;--teal-l:#ddf2ee;
  --amber:#c47830;--amber-l:#fdefd8;
  --gold:#b8963e;
  --shadow:rgba(28,21,32,0.10);
  --font-d:'Cormorant Garamond',Georgia,serif;
  --font-s:'Noto Serif JP',serif;
  --font-m:'DM Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-s);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── Nav ── */
.type-nav{position:sticky;top:0;z-index:100;background:rgba(250,248,245,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.nav-brand{font-family:var(--font-d);font-size:1rem;font-weight:600;color:var(--ink);text-decoration:none;}
.nav-brand span{font-style:italic;color:var(--rose);}
.nav-back{font-family:var(--font-s);font-size:.8rem;color:var(--text-mid);text-decoration:none;display:flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid var(--border);border-radius:999px;transition:all .2s;}
.nav-back:hover{border-color:var(--rose);color:var(--rose);}

/* ── Hero ── */
.type-hero{padding:56px 24px 48px;text-align:center;position:relative;overflow:hidden;}
.type-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 70% at 50% 0%,var(--tc-l,#fae0e8) 0%,transparent 70%);}
.hero-eyebrow{font-family:var(--font-m);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-light);margin-bottom:10px;position:relative;z-index:1;}
.hero-type-id{font-family:var(--font-m);font-size:.72rem;letter-spacing:.15em;color:var(--tc,var(--rose));margin-bottom:6px;position:relative;z-index:1;}
.hero-name{font-family:var(--font-d);font-size:clamp(2.2rem,8vw,3.6rem);font-weight:600;color:var(--ink);line-height:1.1;margin-bottom:12px;position:relative;z-index:1;}
.hero-name em{font-style:italic;color:var(--tc,var(--rose));}
.hero-catchcopy{font-family:var(--font-d);font-style:italic;font-size:clamp(1rem,3vw,1.3rem);color:var(--ink);line-height:1.6;margin-bottom:20px;position:relative;z-index:1;}
.hero-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1;}
.hero-badge{font-family:var(--font-m);font-size:.62rem;padding:4px 14px;border-radius:100px;border:1px solid var(--tc,var(--rose));color:var(--tc,var(--rose));background:var(--tc-l,#fae0e8);letter-spacing:.06em;}

/* ── Sections ── */
.type-sections{width:100%;max-width:680px;margin:0 auto;padding:0 16px 80px;}
.type-section{margin-bottom:14px;}
.ts-block{border:1px solid var(--border);border-radius:18px;background:var(--paper);overflow:hidden;}
.ts-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.ts-icon{font-size:1rem;opacity:.7;flex-shrink:0;}
.ts-title{font-family:var(--font-d);font-size:1.05rem;font-weight:600;color:var(--ink);}
.ts-body{padding:20px;}
.ts-text{font-size:.88rem;color:var(--text-mid);line-height:2;}
.ts-text u{text-decoration:none;background:linear-gradient(transparent 55%,rgba(100,210,230,.42) 55%);padding:0 1px;font-weight:500;}
.ts-text br{display:block;content:'';margin-top:.4em;}

/* ── 特徴リスト ── */
.feature-list{list-style:none;padding:12px 0 4px;}
.feature-item{display:flex;align-items:flex-start;gap:12px;padding:12px 20px;font-size:.88rem;color:var(--text-mid);line-height:1.75;border-bottom:1px solid var(--border);}
.feature-item:last-child{border-bottom:none;}
.feature-item::before{content:'✦';color:var(--tc,var(--rose));font-size:.65rem;margin-top:4px;flex-shrink:0;opacity:.8;}

/* ── 構造グリッド ── */
.structure-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);}
@media(max-width:480px){.structure-grid{grid-template-columns:1fr;}}
.structure-item{background:var(--paper);padding:16px 18px;}
.structure-label{font-family:var(--font-m);font-size:.6rem;letter-spacing:.1em;color:var(--tc,var(--rose));margin-bottom:6px;display:block;text-transform:uppercase;}
.structure-text{font-size:.83rem;color:var(--text-mid);line-height:1.75;}

/* ── サブタイプ ── */
.subtype-block{padding:18px 20px 0;}
.subtype-label{font-family:var(--font-m);font-size:.6rem;letter-spacing:.1em;color:var(--text-light);margin-bottom:8px;}
.subtype-combo{font-family:var(--font-d);font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:4px;}
.subtype-id{font-family:var(--font-m);font-size:.68rem;color:var(--tc,var(--rose));letter-spacing:.08em;margin-bottom:12px;}
.subtype-desc{font-size:.83rem;color:var(--text-mid);line-height:1.8;margin-bottom:16px;}
.subtype-divider{height:1px;background:var(--border);margin:0 -20px;}
.subtype-rows{padding:4px 0;}
.subtype-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.subtype-row:last-child{border-bottom:none;}
.subtype-key{font-family:var(--font-m);font-size:.58rem;letter-spacing:.08em;color:var(--text-light);width:52px;flex-shrink:0;padding-top:2px;}
.subtype-val{font-size:.83rem;color:var(--text-mid);line-height:1.75;flex:1;}
.subtype-sep{height:1px;background:var(--border);margin:4px -20px 0;}

/* ── 弱点・成長 ── */
.insight-text{font-size:.88rem;color:var(--text-mid);line-height:1.95;padding:18px 20px;}
.insight-arrow{color:var(--tc,var(--rose));margin-right:4px;}

/* ── 相性 ── */
.compat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px;}
@media(max-width:480px){.compat-grid{grid-template-columns:1fr;}}
.compat-card{border-radius:12px;padding:12px 14px;border:1px solid var(--border);}
.compat-rel{font-family:var(--font-m);font-size:.6rem;letter-spacing:.1em;margin-bottom:4px;display:block;font-weight:500;}
.compat-rel-simple{font-size:.75rem;margin-bottom:4px;display:block;font-weight:700;color:var(--ink);}
.compat-desc-text{font-size:.72rem;color:var(--text-mid);line-height:1.65;margin-bottom:8px;}
.compat-types{display:flex;flex-wrap:wrap;gap:4px;}
.compat-badge{font-size:.72rem;padding:4px 10px;border-radius:100px;background:var(--bg2);border:1px solid var(--border);color:var(--text-mid);font-family:var(--font-m);text-decoration:none;display:inline-block;transition:all .2s;}
.compat-badge:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
.stress-note{padding:12px 20px;border-top:1px solid var(--border);font-size:.78rem;color:var(--text-light);line-height:1.75;}
.stress-badges{display:inline-flex;gap:4px;flex-wrap:wrap;}
.stress-badge{font-size:.7rem;padding:1px 8px;border-radius:100px;background:var(--bg2);border:1px solid var(--border);color:var(--text-mid);font-family:var(--font-m);}

/* ── All types nav ── */
.all-types-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px 20px;}
@media(max-width:480px){.all-types-grid{grid-template-columns:repeat(2,1fr);}}
.type-nav-item{text-decoration:none;display:flex;flex-direction:column;gap:2px;padding:10px 12px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);transition:all .2s;}
.type-nav-item:hover{border-color:var(--rose);background:var(--rose-l);}
.type-nav-item.active{border-color:var(--tc,var(--rose));background:var(--tc-l,var(--rose-l));}
.tni-id{font-family:var(--font-m);font-size:.55rem;color:var(--text-light);}
.tni-name{font-size:.72rem;color:var(--ink);font-weight:500;line-height:1.4;}

/* ── Footer ── */
.type-footer{width:100%;max-width:680px;margin:0 auto;padding:0 16px 40px;}
.footer-block{border:1px solid var(--border);border-radius:18px;background:var(--bg2);overflow:hidden;}
.footer-head{padding:16px 20px;border-bottom:1px solid var(--border);font-family:var(--font-d);font-size:1rem;font-weight:600;color:var(--ink);}
.footer-links{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px 20px;}
@media(max-width:480px){.footer-links{grid-template-columns:1fr;}}
.footer-link{display:flex;flex-direction:column;gap:2px;padding:12px 14px;border-radius:12px;background:var(--paper);border:1px solid var(--border);text-decoration:none;transition:all .2s;}
.footer-link:hover{border-color:var(--rose);background:var(--rose-l);}
.fl-label{font-family:var(--font-m);font-size:.58rem;letter-spacing:.1em;color:var(--text-light);}
.fl-name{font-size:.84rem;font-weight:500;color:var(--ink);}
.fl-desc{font-size:.72rem;color:var(--text-light);line-height:1.5;margin-top:2px;}

/* ── 成長段階 ── */
.level-stack{display:flex;flex-direction:column;gap:8px;padding:16px 20px;}
.level-item{border-radius:10px;padding:10px 14px;border-left:3px solid;}
.level-item.healthy{border-color:#7a9c5b;background:#e4f0d8;}
.level-item.average{border-color:#c9a84c;background:#fdf3d0;}
.level-item.stress{border-color:var(--rose);background:var(--rose-l);}
.level-lbl{font-family:var(--font-m);font-size:.58rem;letter-spacing:.1em;margin-bottom:4px;font-weight:600;}
.level-item.healthy .level-lbl{color:#3d6e2a;}
.level-item.average .level-lbl{color:#8a6a20;}
.level-item.stress .level-lbl{color:var(--rose);}
.level-txt{font-size:.78rem;color:var(--text-mid);line-height:1.7;}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.type-hero,.type-section{animation:fadeIn .45s ease both;}
.type-section:nth-child(1){animation-delay:.05s;}
.type-section:nth-child(2){animation-delay:.1s;}
.type-section:nth-child(3){animation-delay:.15s;}
.type-section:nth-child(4){animation-delay:.2s;}
.type-section:nth-child(5){animation-delay:.25s;}
.type-section:nth-child(6){animation-delay:.3s;}
</style>
</head>

<script>
// ══════════════════════════════════════
// DATA（全12タイプ）
// ══════════════════════════════════════
const TYPES = [
  {id:1, style:'Se',center:'heart',name:'ロマンハンター（狩人）',
   oneline:'愛されていると確信するまで、前進を止めない。',
   styleLabel:'狩猟型',centerLabel:'愛情型',
   styleColor:'var(--rose)',styleBg:'var(--rose-l)',
   centerColor:'var(--rose)',centerBg:'var(--rose-l)',
   core:`このタイプの根底には、<u>「自分は本当に愛されているのか」</u>という問いが常にあります。その答えを確かめるために積極的に動き、アプローチし、相手の反応を細かく観察し続けます。<br><br>積極性の本質は自信ではありません。その裏に潜むのは、<u>愛の証明を得ずにはいられない強い欲求</u>です。追いかけている間こそ最もエネルギーに満ちており、相手が自分を求めていると感じる瞬間に、生きている実感を最も鮮明に感じます。<br><br>関係が深まるほど、確認したい気持ちは強まっていきます。<u>返信の速さ、文章の長さ、特別扱いの有無</u>——これらすべてが愛情量を測るバロメーターとなり、それが少しでも揺らぐたびに不安が増幅されます。<br><br>そのため、関係が深まるほど逆に不安も大きくなるという逆説を抱えます。<u>愛の確信は、得るたびに次の確認を求める循環</u>に入り込みやすく、相手を疲弊させてしまうことも。<br><br>しかし、愛の確信が持てたとき、このタイプは<u>非常に献身的で情熱的なパートナー</u>になります。相手を中心に世界が動き、細やかな気遣いと強い独占欲が、深い絆を生み出します。<br><br>このタイプの愛は、<u>「求めることで守る」という独自の形</u>を持っています。それを受け入れてくれる相手との関係では、誰にも真似できない強さの愛を育てることができます。`,
   behaviors:['自分からアプローチし、相手の反応を細かく観察する','返信の速さや文章量で愛情量を測ろうとする','独占欲が強く、他の異性との関係に過敏になりやすい','関係が深まるにつれ確認行動がエスカレートする傾向がある'],
   structure:{think:'「愛されているか・いないか」ですべてを判断する',feel:'確認が取れると安心し、取れないと不安が止まらない',act:'疑問を解消するために積極的に動く。待てない',relation:'深く愛するが、確認行動がエスカレートしやすい'},
   wingDetails:{
     head:{role:'分析眼が加わる',impact:'より計算的・戦略的に確認行動をとるようになる',drift:'冷静に見えるが内側の不安は変わらない'},
     guts:{role:'本能が加速する',impact:'感情表現が直球になり、衝動が強まる',drift:'エネルギッシュだが感情爆発しやすくなる'},
   },
   weakness:'確認行動が止まらず、相手を追い詰めてしまう。「もっと愛を証明してほしい」という要求が、やがて相手の息の根を止める。',
   growth:'「愛されていること」を出発点にできるようになること。証明を求める前に、今ここにある愛を受け取れるようになることが鍵。',
   compat:{resonance:[4],bipolar:[5,6],parallel:[7],stimulus:[8,9],mirror:[2,3],stillwater:[10,11,12]},
   stressTypes:[11,12]},

  {id:2, style:'Se',center:'head',name:'ストラテジスト（戦略家）',
   oneline:'安心できる関係を、自分の手で設計しようとする。',
   styleLabel:'狩猟型',centerLabel:'安心型',
   styleColor:'var(--rose)',styleBg:'var(--rose-l)',
   centerColor:'var(--teal)',centerBg:'var(--teal-l)',
   core:`このタイプは<u>「安心できるかどうか」を自分でコントロールすることで確保</u>しようとします。積極的にリードし、関係の主導権を握ることで、初めて心が落ち着く感覚を得られます。<br><br>外から見ると自信家で積極的に見えますが、内側では<u>「この関係は本当に安全か」</u>という問いが常に動いています。感情より論理で相手を評価し、信頼できると判断するまでは、深く関わることを意識的に抑制します。<br><br>相手を観察・分析し、<u>一貫性・誠実さ・予測可能性</u>が揃ったと確信できたとき、急速に関係を深めます。信頼の扉が開くと、それまでの慎重さが嘘のように、一気に深い関係へと進みます。<br><br>コントロールを手放すことが最大の恐怖で、<u>主導権を渡す＝不安の増幅</u>という回路が強く働いています。これが時として相手の自由を奪い、息苦しさを感じさせてしまう原因になります。<br><br>このタイプが輝くのは、<u>自分が設計した関係の中</u>。明確な役割分担と予測可能なルーティンがある関係では、安心感と愛情が最大限に発揮されます。<br><br>信頼できると確信した相手には、<u>計画的かつ戦略的な愛情表現</u>を惜しみなく注ぎます。一度信頼した相手への誠実さと、関係を守り続ける力は、12タイプの中でも際立っています。`,
   behaviors:['関係の主導権を握ることで安心感を得る','相手を「観察・分析」して信頼できるか判定する','感情より論理で関係を判断する傾向がある','不確実な要素を嫌い、確証を求め続ける'],
   structure:{think:'「この関係はコントロールできているか」を常に確認する',feel:'安心感は論理で作るもの。感情だけでは動けない',act:'主導権を握ることで不安を管理する',relation:'表面は積極的でも、心理的には非常に慎重'},
   wingDetails:{
     heart:{role:'感情的な熱量が加わる',impact:'行動がより積極的かつ情熱的になる',drift:'情熱と分析が混在する複雑さが出る'},
     guts:{role:'本能性が加わる',impact:'より自分軸で動き、孤独を選びやすくなる',drift:'孤独な戦略家になりやすい'},
   },
   weakness:'コントロールへの執着で相手を窒息させてしまう。「主導権を渡す＝不安」という回路が、相手の自由を奪い続ける。',
   growth:'「予測できない相手」を信頼することを学ぶこと。コントロールを手放したとき、より深い安心が生まれる。',
   compat:{resonance:[5],bipolar:[4,6],parallel:[8],stimulus:[7,9],mirror:[1,3],stillwater:[10,11,12]},
   stressTypes:[6,12]},

  {id:3, style:'Se',center:'guts',name:'チャレンジャー（挑戦者）',
   oneline:'欲しいと感じた瞬間に、もう動いている。',
   styleLabel:'狩猟型',centerLabel:'本能型',
   styleColor:'var(--rose)',styleBg:'var(--rose-l)',
   centerColor:'var(--amber)',centerBg:'var(--amber-l)',
   core:`このタイプは<u>「自分でいられるか」を最優先に恋愛を動かします</u>。好意を持った瞬間には行動しており、考える前に体が動く——それがこのタイプの本質的なスタイルです。<br><br>感情に嘘がなく、喜びも怒りも直球で表現します。<u>裏表がなく、衝動に忠実</u>であることが最大の特徴で、計算や戦略より「今この瞬間の本音」を常に優先します。<br><br>束縛への抵抗感は本能的に強く、<u>自分の自由と独立性を守れる関係</u>にのみ安心して深く関われます。自由を侵害されると感じた瞬間、感情のスイッチが切れます。<br><br>一度信頼した相手には、驚くほど<u>強い保護本能と忠誠心</u>を示します。普段の自由奔放さとは正反対に、深まった関係では誰よりも相手を守ろうとする力が湧き上がります。<br><br>このタイプの課題は<u>衝動と継続性のバランス</u>。熱が入りきった後に「あれは本当に好きだったのか」と自分でも戸惑うことがありますが、それは感情が薄れたのではなく、次の本音を探しているサインです。<br><br>深まった関係での誠実さと強さは本物で、<u>「一緒にいることが自然体でいること」という関係</u>を築けた相手とは、他の誰も入り込めない強固な絆を育てます。`,
   behaviors:['好意を持てばすぐ行動に移す。計画より衝動が先','感情が素直で、怒りや熱情が直接的に出る','独立性が高く、縛られることへの強い抵抗がある','一度深まると非常に強い保護本能が出る'],
   structure:{think:'「これが自分の本音か」を唯一の判断基準にする',feel:'感情はフルスロットル。抑制が苦手',act:'衝動が先。後から理由を考える',relation:'束縛を嫌うが、深まると保護本能が爆発する'},
   wingDetails:{

   core:`このタイプは<u>「愛することで自分の価値を証明する」</u>という深い信念を持っています。尽くすことが自己表現であると同時に、愛されるための手段でもあります。<br><br>相手のために自分を後回しにすることへの抵抗感が非常に薄く、むしろ<u>尽くすことに自然な喜びと充足感</u>を覚えます。委ねることが得意で、相手のリードに従うことで関係が深まると感じます。<br><br>ただし深層には、<u>「気づいてほしい」という静かな叫び</u>があります。見返りを求めているつもりはなくても、傷ついたとき「こんなに尽くしているのに」という感情が湧き上がることがあります。<br><br>傷ついても「気にしていない」と言ってしまう、相手が辛そうにしていると自分の問題より先に動いてしまう——この<u>献身の深さと傷つきやすさは、表裏一体</u>です。<br><br>「自分のために」より「相手のために」の方がずっと動きやすく、尽くすことをやめると自分の居場所が分からなくなる感覚があります。<u>尽くすことがアイデンティティの一部</u>になっています。<br><br>このタイプが最も輝くのは、<u>受け取ることと与えることが対等な関係</u>の中。尽くされることを当然と思わず、きちんと受け取って返してくれる相手との関係では、このタイプの愛情の深さが本当の意味で生きてきます。`,

   centerColor:'var(--teal)',centerBg:'var(--teal-l)',
   core:`このタイプは<u>「確信が持てるまで全力で委ねることができない」</u>という慎重さを持ちます。関係が深まるまでの時間は非常に長いですが、一度信頼した相手には驚くほど深く誠実なパートナーになります。<br><br>相手を長期間観察し、<u>一貫性・誠実さ・安定性</u>が確認できたときだけ、心を開きます。このプロセスは相手を試しているのではなく、自分が傷つかないための本能的な防衛反応です。<br><br>「この人、本当は何を考えているんだろう」という問いが頭から離れず、<u>表面の言動と内面の一致</u>を長い時間をかけて確かめます。確証が得られないまま関係が進むことを、本能的に拒否します。<br><br>信頼した相手への忠誠心は突出して高く、<u>一度決めた関係への献身は非常に深い</u>ものになります。裏切らないし、裏切られることへの恐怖も非常に強い。<br><br>長期的な視点で関係を見ており、将来を具体的に考えながら動きます。<u>「この人と10年後も一緒にいられるか」</u>という問いが、常に関係の奥底で動いています。<br><br>このタイプの課題は<u>「確信を待つあまり関係が始まらない」</u>こと。完全な信頼は関係の外では得られず、踏み出すことでのみ育まれます。慎重さと踏み出す勇気のバランスを見つけることが、このタイプの鍵です。`,
   behaviors:['信頼できるかどうか、長期観察しないと決断できない','一度信頼したらとことん深く関わるが、そこまでが長い','「この人、本当は何を考えているんだろう」が頭から離れない','関係の将来を深く考えすぎて、行動が遅れる','誰にでも心を開かない分、心を開いた相手への忠誠心が異常に高い','深く関わる前に、相手の一貫性を確かめている'],
   structure:{think:'「この人は信頼できるか」を長期的に分析する',feel:'信頼と安心が揃って初めて感情を開く',act:'慎重に、一歩ずつ。確証なしに動かない',relation:'誠実さと忠誠心が突出して高い'},

   core:`このタイプは<u>行動で愛を表現し、行動で愛を確認する</u>ことを本質とします。言葉より先に体が動いており、相手の細かい変化に誰よりも早く気づいて、先回りして動くことで愛を示します。<br><br>相手のために動くことが喜びであり、<u>自分のことを後回しにすることへの抵抗感が非常に薄い</u>のが特徴です。尽くすことがアイデンティティの一部になっており、それを止められると自分の存在意義が揺らぐ感覚があります。<br><br>「何か食べたいものある？」と無意識に聞いている、相手の好きなものを覚えて日常に組み込む——<u>細やかで継続的なケア</u>がこのタイプの愛の言語です。大きな行動より、日々の積み重ねに愛が宿っています。<br><br>ただし深層では、<u>「気づいてもらえない」という痛み</u>を静かに抱えています。感謝を求めているわけではないのに、認められないと消耗が蓄積していきます。その痛みを言葉にできないまま、抱え込み続けることがあります。<br><br>このタイプが安心できるのは、<u>自分の存在が相手の日常にとって欠かせないものになっているとき</u>。「あなたがいてくれてよかった」という言葉が、このタイプの愛情タンクを満たします。<br><br>継続的な行動で非常に深い信頼を築き、<u>揺るがない絆を作り出す力</u>を持っています。派手さはなくても、長い時間をかけて育てる関係では、このタイプの右に出る存在はいません。`,

   structure:{think:'「自分はここにいていいか」を根底で問い続ける',feel:'感情は深く、外には出さない。行動に変換する',act:'継続する存在であることが最大の表現',relation:'去らないことが愛の証明。無言の忠誠心'},

function getTypeId() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('type'));
  return (id >= 1 && id <= 12) ? id : 1;
}

function getWingType(type, secondCenter) {
  if (!secondCenter) return null;
  return TYPES.find(t => t.style === type.style && t.center === secondCenter);
}

  const typeId = getTypeId();
  const type = TYPES.find(t => t.id === typeId);
  if (!type) return;

  // page title
  document.title = `Type ${type.id} ${type.name} ｜ Pola タイプ解説`;

  // CSS vars
  document.documentElement.style.setProperty('--tc', type.styleColor);
  document.documentElement.style.setProperty('--tc-l', type.styleBg);

  // ── Hero ──
  const hero = document.getElementById('typeHero');
  hero.innerHTML = `
    <div class="hero-eyebrow">Your Pola Type</div>
    <div class="hero-type-id">Type ${type.id}</div>
    <h1 class="hero-name">${type.name.replace(/（/, '<em>（').replace(/）/, '）</em>')}</h1>
    <div class="hero-catchcopy">"${type.oneline}"</div>
    <div class="hero-badges">
      <span class="hero-badge" style="border-color:${type.styleColor};color:${type.styleColor};background:${type.styleBg};">${type.styleLabel}</span>

      <div class="ts-block">
        <div class="ts-head"><span class="ts-icon">↑</span><span class="ts-title">成長の方向</span></div>
        <div class="insight-text"><span class="insight-arrow">↑</span>${type.growth}</div>
      </div>
    </div>`;

  // ── Section 5.5: 成長段階 ──
  const lvl = LEVELS[typeId];
  if (lvl) {
    sections.innerHTML += `
    <div class="type-section">
      <div class="ts-block">
        <div class="ts-head"><span class="ts-icon">◎</span><span class="ts-title">成長段階</span></div>
        <div class="level-stack">
          <div class="level-item healthy"><div class="level-lbl">HEALTHY — 健全状態</div><div class="level-txt">${lvl.healthy}</div></div>
          <div class="level-item average"><div class="level-lbl">AVERAGE — 平均状態</div><div class="level-txt">${lvl.average}</div></div>
          <div class="level-item stress"><div class="level-lbl">STRESS — ストレス状態</div><div class="level-txt">${lvl.stress}</div></div>
        </div>
      </div>
    </div>`;
  }

  // ── Section 6: 相性タイプ ──
  const compatHtml = Object.keys(COMPAT_INFO).map(relKey => {
    const info = COMPAT_INFO[relKey];
    const typeNums = type.compat[relKey] || [];
    const badges = typeNums.map(n => {
      const t = TYPES.find(t => t.id === n);
      return t ? `<a class="compat-badge" href="?type=${n}">Type ${n}　${t.name}</a>` : '';
    }).join('');
    return `
      <div class="compat-card" style="border-color:${info.color}20;background:${info.bg}88;">
        <span class="compat-rel" style="color:${info.color};">— ${info.name}</span>
        <span class="compat-rel-simple">${info.simple}</span>
        <p class="compat-desc-text">${info.desc}</p>
        <div class="compat-types">${badges}</div>
      </div>`;
  }).join('');
  const stressBadges = type.stressTypes.map(n => {
    const t = TYPES.find(t => t.id === n);
    return t ? `<span class="stress-badge">Type ${n}</span>` : '';
  }).join('');
  sections.innerHTML += `
    <div class="type-section">
      <div class="ts-block">
        <div class="ts-head"><span class="ts-icon">◇</span><span class="ts-title">相性タイプ</span></div>
        <div class="compat-grid">${compatHtml}</div>
        <div class="stress-note">⚡ ストレスを感じやすいタイプ：<span class="stress-badges">${stressBadges}</span></div>
      </div>
    </div>`;

  // ── Section 7: 全タイプナビ ──
  const allTypesHtml = TYPES.map(t => `
    <a href="?type=${t.id}" class="type-nav-item${t.id === typeId ? ' active' : ''}">
      <span class="tni-id">Type ${t.id}</span>
      <span class="tni-name">${t.name}</span>
    </a>`).join('');
  sections.innerHTML += `
    <div class="type-section">
      <div class="ts-block">
        <div class="ts-head"><span class="ts-icon">≡</span><span class="ts-title">全タイプ一覧</span></div>
        <div class="all-types-grid">${allTypesHtml}</div>
      </div>
    </div>`;

  // 現在のタイプをハイライト
  document.querySelectorAll('.type-nav-item').forEach(el => {
    const href = el.getAttribute('href');
    if (href === `?type=${typeId}`) el.classList.add('active');
  });
}

render();
</script>
</body>
</html>
